name: Re-run Failed Builds

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID to retry failures from (leave empty for last completed run)'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  collect:
    name: Collect Failed Boards
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      version: ${{ steps.collect.outputs.version }}
      version_dir: ${{ steps.collect.outputs.version_dir }}
      skip: ${{ steps.collect.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Read VERSION
        id: version
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          echo "version_dir=$(cat VERSION | tr '.' '_')" >> $GITHUB_OUTPUT
      - name: Collect failed jobs
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          with open('board-matrix.json') as f:
              all_boards = json.load(f)

          RUN_ID = os.environ.get('INPUT_RUN_ID', '').strip()
          if not RUN_ID:
              ref = os.environ.get('GITHUB_REF_NAME', '')
              result = subprocess.run(
                  ['gh', 'run', 'list', '--branch', ref,
                   '--workflow', 'Auto-Update Marlin Firmwares',
                   '--status', 'completed', '--json', 'databaseId',
                   '--jq', '.[0].databaseId', '--limit', '1'],
                  capture_output=True, text=True
              )
              RUN_ID = result.stdout.strip()

          print(f"Run ID: {RUN_ID}", file=sys.stderr)
          if not RUN_ID or RUN_ID == 'null':
              with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                  print('skip=true', file=out)
                  print('matrix={"include":[]}', file=out)
              sys.exit(0)

          result = subprocess.run(
              ['gh', 'run', 'view', RUN_ID, '--json', 'jobs',
               '--jq', '.jobs[] | select(.conclusion=="failure") | .name'],
              capture_output=True, text=True
          )
          failed_names = [n.strip() for n in result.stdout.strip().split('\n') if n.strip()]
          print(f"Failed: {failed_names}", file=sys.stderr)

          GROUPS = ['Creality ', 'delta+Geeetech ', 'Wanhao+Anet+Tronxy ',
                    'BIQU+Sovol+AnyCubic ', 'Artillery+Tevo+Kingroon ', 'Other ']
          found = []
          for name in failed_names:
              for prefix in GROUPS:
                  if name.startswith(prefix):
                      label = name[len(prefix):]
                      for entry in all_boards:
                          if entry.get('label') == label:
                              found.append(entry)
                              break
                      break

          print(f"Found {len(found)} boards to retry", file=sys.stderr)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              print(f'matrix={json.dumps({"include": found})}', file=out)
              print('skip=false', file=out)
          PYEOF

  rebuild:
    name: "Rebuild ${{ matrix.label }}"
    needs: collect
    if: needs.collect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.collect.outputs.matrix) }}
      max-parallel: 4
      fail-fast: false
    env:
      BOARD: ${{ matrix.board }}
      VER: ${{ needs.collect.outputs.version }}
      VER_DIR: ${{ needs.collect.outputs.version_dir }}
      BUILD_DIR: ${{ matrix.build_path }}
      CONFIG_DIR: ${{ matrix.config_path }}
      BOARD_PATH: ${{ matrix.board_path }}
      OFFICIAL_PATH: ${{ matrix.official_path }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare build directories
        run: mkdir -p "$BUILD_DIR"
      - name: Prepare configs
        run: |
          CUSTOM_DIR="Firmware/Configuration/$BOARD_PATH"
          OFFICIAL_ARGS="--board \"$BOARD_PATH\" --version \"$VER\" --output-dir \"$CONFIG_DIR\""
          if [ -n "$OFFICIAL_PATH" ] && [ "$OFFICIAL_PATH" != "$BOARD_PATH" ]; then
            OFFICIAL_ARGS="$OFFICIAL_ARGS --official-path \"$OFFICIAL_PATH\""
          fi
          if [ -d "$CUSTOM_DIR" ] && [ -f "$CUSTOM_DIR/Configuration.h" ]; then
            eval "python3 scripts/prepare-configs.py $OFFICIAL_ARGS --custom-dir \"$CUSTOM_DIR\""
          else
            eval "python3 scripts/prepare-configs.py $OFFICIAL_ARGS"
          fi
      - name: Compile firmware
        run: |
          mkdir -p "$BUILD_DIR"
          docker run -u root:root -e BOARD -e USE_TAG="$VER" \
            -v "$(pwd)/$BUILD_DIR:/build_output" -v "$(pwd)/$CONFIG_DIR:/config" \
            --name marlin-build --entrypoint /bin/bash frealmyr/marlin-build:latest -c "
            git clone --depth 1 --branch \$USE_TAG https://github.com/MarlinFirmware/Marlin.git /Marlin/ || true
            cp -r /config/* /Marlin/Marlin/ 2>/dev/null || true
            sed -i \"s/default_envs.*/default_envs = \${BOARD}/\" /Marlin/platformio.ini
            cd /Marlin
            platformio run && rc=0 || rc=\$?
            mkdir -p /build_output
            find /Marlin/.pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\$f\" /build_output/
              md5sum \"/build_output/\$(basename \"\$f\")\" > \"/build_output/\$(basename \"\$f\").md5\"
            done
            exit \$rc
          "; EXIT_CODE=$?
          docker rm marlin-build 2>/dev/null || true
          exit $EXIT_CODE
      - name: Push firmware + configs
        run: |
          git config --global user.name "JJR Bot"
          git config --global user.email "jrodriguez@qitec.net"
          git add "$CONFIG_DIR/Configuration.h" "$CONFIG_DIR/Configuration_adv.h" "$CONFIG_DIR/config.ini" 2>/dev/null || true
          find "$BUILD_DIR" -type f \( -name 'firmware.bin' -o -name 'firmware.hex' -o -name 'firmware.bin.md5' -o -name 'firmware.hex.md5' \) -exec git add {} \; 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "build: ${{ matrix.label }} @ $VER"
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push "https://${{ github.actor }}:${{ secrets.COMMIT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:feat/auto-update-marlin; then break; fi
              sleep 5
            done
          fi
