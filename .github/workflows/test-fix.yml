name: Test Fix - Full Compile (8-bit + 32-bit)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Marlin version tag (e.g., 2.1.2.7)'
        required: false
        default: '2.1.2.7'

jobs:
  test-compile-8bit:
    name: "8-bit AVR - AnyCubic Chiron (mega2560)"
    runs-on: ubuntu-latest
    env:
      BOARD: mega2560
      VER: ${{ github.event.inputs.version }}
      VER_DIR: 2_1_2_7
      BUILD_DIR: Firmware/Builds/Test/mega2560
      CONFIG_DIR: Firmware/Configuration/Test/mega2560
      BOARD_PATH: AnyCubic/Chiron
    steps:
      - uses: actions/checkout@v4
      - name: Prepare build dirs
        run: mkdir -p "$BUILD_DIR" "$CONFIG_DIR"
      - name: Prepare configs
        run: |
          python3 scripts/prepare-configs.py \
            --board "$BOARD_PATH" --version "$VER" \
            --output-dir "$CONFIG_DIR"
      - name: Full compile test
        run: |
          docker run -u root:root -e BOARD -e USE_TAG="$VER" \
            -v "$(pwd)/$BUILD_DIR:/build_output" -v "$(pwd)/$CONFIG_DIR:/config" \
            --name marlin-test --entrypoint /bin/bash frealmyr/marlin-build:latest -c "
            set -e
            echo '=== CLONE ==='
            git clone --depth 1 --branch \$USE_TAG https://github.com/MarlinFirmware/Marlin.git /Marlin/
            test -d /Marlin/Marlin || { echo 'CLONE FAILED'; exit 1; }

            echo '=== COPY CONFIGS ==='
            cp -r /config/* /Marlin/Marlin/ 2>/dev/null || true
            sed -i \"s/default_envs.*/default_envs = \\\${BOARD}/\" /Marlin/platformio.ini

            echo '=== COMPILE ==='
            cd /Marlin
            platformio run

            echo '=== COLLECT OUTPUT ==='
            mkdir -p /build_output
            find /Marlin/.pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\\\$f\" /build_output/
              md5sum \"/build_output/\\\$(basename \\\"\\\$f\\\")\" > \"/build_output/\\\$(basename \\\"\\\$f\\\").md5\"
            done
            echo '=== BUILD OK ==='
          "
          EXIT_CODE=$?
          docker rm marlin-test 2>/dev/null || true
          exit $EXIT_CODE
      - name: Show firmware
        run: ls -la "$BUILD_DIR/" || echo "No firmware in $BUILD_DIR"

  test-compile-32bit:
    name: "32-bit STM32 - AnyCubic Mega Zero BTT (STM32F103RC_btt)"
    runs-on: ubuntu-latest
    env:
      BOARD: STM32F103RC_btt
      VER: ${{ github.event.inputs.version }}
      VER_DIR: 2_1_2_7
      BUILD_DIR: Firmware/Builds/Test/STM32F103RC_btt
      CONFIG_DIR: Firmware/Configuration/Test/STM32F103RC_btt
      BOARD_PATH: AnyCubic/Mega_Zero/BigTreeTech_SKR_Mini_MZ_V1.0
    steps:
      - uses: actions/checkout@v4
      - name: Prepare build dirs
        run: mkdir -p "$BUILD_DIR" "$CONFIG_DIR"
      - name: Prepare configs
        run: |
          python3 scripts/prepare-configs.py \
            --board "$BOARD_PATH" --version "$VER" \
            --output-dir "$CONFIG_DIR"
      - name: Full compile test
        run: |
          docker run -u root:root -e BOARD -e USE_TAG="$VER" \
            -v "$(pwd)/$BUILD_DIR:/build_output" -v "$(pwd)/$CONFIG_DIR:/config" \
            --name marlin-test --entrypoint /bin/bash frealmyr/marlin-build:latest -c "
            set -e
            echo '=== CLONE ==='
            git clone --depth 1 --branch \$USE_TAG https://github.com/MarlinFirmware/Marlin.git /Marlin/
            test -d /Marlin/Marlin || { echo 'CLONE FAILED'; exit 1; }

            echo '=== COPY CONFIGS ==='
            cp -r /config/* /Marlin/Marlin/ 2>/dev/null || true
            sed -i \"s/default_envs.*/default_envs = \\\${BOARD}/\" /Marlin/platformio.ini

            echo '=== COMPILE ==='
            cd /Marlin
            platformio run

            echo '=== COLLECT OUTPUT ==='
            mkdir -p /build_output
            find /Marlin/.pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\\\$f\" /build_output/
              md5sum \"/build_output/\\\$(basename \\\"\\\$f\\\")\" > \"/build_output/\\\$(basename \\\"\\\$f\\\").md5\"
            done
            echo '=== BUILD OK ==='
          "
          EXIT_CODE=$?
          docker rm marlin-test 2>/dev/null || true
          exit $EXIT_CODE
      - name: Show firmware
        run: ls -la "$BUILD_DIR/" || echo "No firmware in $BUILD_DIR"
