name: Test Fix - BOARD ENV Validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Marlin version tag (e.g., 2.1.2.7)'
        required: false
        default: '2.1.2.7'

jobs:
  test-env-validation:
    name: "Test 8-bit + 32-bit env validation"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [mega2560, STM32F103RC_btt]
        label: [8-bit-AVR, 32-bit-STM32]
    steps:
      - uses: actions/checkout@v4

      - name: Test find grep for board env
        run: |
          VER="${{ github.event.inputs.version }}"
          BOARD="${{ matrix.board }}"
          echo "Testing BOARD=$BOARD with version $VER"

          docker run -u root:root -e BOARD -e USE_TAG="$VER"             --name marlin-test --entrypoint /bin/bash frealmyr/marlin-build:latest -c "
            set -e
            echo '--- Cloning Marlin $USE_TAG ---'
            git clone --depth 1 --branch \$USE_TAG https://github.com/MarlinFirmware/Marlin.git /Marlin/
            test -d /Marlin/Marlin || { echo 'CLONE FAILED'; exit 1; }

            echo '--- Test 1: OLD grep (only platformio.ini) ---'
            if grep -q \"env:.*\$BOARD\" /Marlin/platformio.ini; then
              echo 'RESULT: OLD method FOUND it in platformio.ini'
            else
              echo 'RESULT: OLD method NOT FOUND in platformio.ini (expected for sub-ini)'
            fi

            echo '--- Test 2: NEW find+grep (recursive .ini) ---'
            if find /Marlin/ -name '*.ini' -exec grep -q \"env:.*\$BOARD\" {} +; then
              echo 'RESULT: NEW method FOUND it! Fix works.'
            else
              echo 'RESULT: NEW method also NOT FOUND - FIX FAILED'
              exit 1
            fi

            echo ''
            echo '--- Found env definitions ---'
            find /Marlin/ -name '*.ini' -exec grep -l \"env:.*\$BOARD\" {} \;

            echo ''
            echo '--- All .ini files in Marlin ---'
            find /Marlin/ -name '*.ini' | head -20
          "
          EXIT_CODE=$?
          docker rm marlin-test 2>/dev/null || true
          exit $EXIT_CODE
