        run: |
          OFFICIAL_ARGS="--board \"$BOARD_PATH\" --version \"$VER\" --output-dir \"$CONFIG_DIR\""
          if [ -n "$OFFICIAL_PATH" ] && [ "$OFFICIAL_PATH" != "$BOARD_PATH" ]; then
            OFFICIAL_ARGS="$OFFICIAL_ARGS --official-path \"$OFFICIAL_PATH\""
          fi
          eval "python3 scripts/prepare-configs.py $OFFICIAL_ARGS"
      - name: Compile firmware (EN)
        run: |
          mkdir -p "$BUILD_DIR"
          docker run -u root:root -e BOARD -e USE_TAG="$VER" \
            -v "$(pwd)/$BUILD_DIR:/build_output" -v "$(pwd)/$CONFIG_DIR:/config" \
            --name marlin-build --entrypoint /bin/bash frealmyr/marlin-build:latest -c "
            set -e
            git clone --depth 1 --branch \$USE_TAG https://github.com/MarlinFirmware/Marlin.git /Marlin/
            test -d /Marlin/Marlin || { echo 'CLONE FAILED'; exit 1; }
            cp -r /config/* /Marlin/Marlin/ 2>/dev/null || true
            sed -i \"s/default_envs.*/default_envs = \${BOARD}/\" /Marlin/platformio.ini
            cd /Marlin
            echo '=== Building EN ==='
            platformio run
            mkdir -p /build_output/en
            find .pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\$f\" /build_output/en/
              md5sum \"/build_output/en/\$(basename \"\$f\")\" > \"/build_output/en/\$(basename \"\$f\").md5\"
            done
            echo '=== Building ES ==='
            rm -rf .pio/build
            sed -i 's/^#define LCD_LANGUAGE[[:space:]]*en/#define LCD_LANGUAGE es/' Marlin/Configuration.h
            platformio run
            mkdir -p /build_output/es
            find .pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\$f\" /build_output/es/
              md5sum \"/build_output/es/\$(basename \"\$f\")\" > \"/build_output/es/\$(basename \"\$f\").md5\"
            done
          "; EXIT_CODE=$?
          docker rm marlin-build 2>/dev/null || true
          exit $EXIT_CODE
      - name: Push firmware + configs
        run: |
          sudo chown -R $USER:$USER "$BUILD_DIR" 2>/dev/null || true
          git config --global user.name "JJR Bot"
          git config --global user.email "jrodriguez@qitec.net"
          git add "$CONFIG_DIR/Configuration.h" "$CONFIG_DIR/Configuration_adv.h" "$CONFIG_DIR/config.ini" 2>/dev/null || true
          find "$BUILD_DIR" -type f \( -name 'firmware.bin' -o -name 'firmware.hex' -o -name 'firmware.bin.md5' -o -name 'firmware.hex.md5' \) -exec git add {} \; 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "build: ${{ matrix.label }} @ $VER (EN+ES)"
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push "https://${{ github.actor }}:${{ secrets.COMMIT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master; then break; fi
              sleep 5
            done
          fi

  bump-version:
    name: Update VERSION file
    needs: [detect, build-creality, build-delta-geetech, build-wanhao-anet-tronxy, build-biqu-sovol-anycubic, build-artillery-tevo, build-others]
    if: always() && needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "${{ needs.detect.outputs.version }}" > VERSION
          git config --global user.name "JJR Bot"
          git config --global user.email "jrodriguez@qitec.net"
          git add VERSION
          git commit -m "Bump to Marlin ${{ needs.detect.outputs.version }}" || true
          git pull --rebase --autostash
          git push "https://${{ github.actor }}:${{ secrets.COMMIT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master

  generate-status:
    name: Generate Build Status
    needs: [detect, bump-version]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate BUILD_STATUS.md
        run: |
          python3 scripts/generate-build-status.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Commit BUILD_STATUS.md
        run: |
          git config --global user.name "JJR Bot"
          git config --global user.email "jrodriguez@qitec.net"
          git add BUILD_STATUS.md
          git commit -m "docs: update build status after workflow run" || true
          git pull --rebase --autostash
          git push "https://${{ github.actor }}:${{ secrets.COMMIT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master
      - name: Update Gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
import json, os, urllib.request
gist_id = "44473d94aa2f23dd2120cd54e39dd8d9"
with open("BUILD_STATUS.md") as f:
    content = f.read()
data = json.dumps({"files": {"BUILD_STATUS.md": {"content": content}}}).encode()
req = urllib.request.Request(
    f"https://api.github.com/gists/{gist_id}",
    data=data, method="PATCH",
    headers={
        "Authorization": f"token {os.environ['GH_TOKEN']}",
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json"
    })
urllib.request.urlopen(req)
print(f"Gist {gist_id} updated")
PYEOF

