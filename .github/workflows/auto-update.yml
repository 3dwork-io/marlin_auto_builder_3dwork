name: Auto-Update Marlin Firmwares

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force specific version (e.g., 2.1.2.7)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  detect:
    name: Detect Marlin Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      version_dir: ${{ steps.check.outputs.version_dir }}
      skip: ${{ steps.check.outputs.skip }}
      matrix_creality: ${{ steps.matrix-creality.outputs.matrix }}
      matrix_delta_geetech: ${{ steps.matrix-delta-geetech.outputs.matrix }}
      matrix_wanhao_anet_tronxy: ${{ steps.matrix-wanhao-anet-tronxy.outputs.matrix }}
      matrix_biqu_sovol_anycubic: ${{ steps.matrix-biqu-sovol-anycubic.outputs.matrix }}
      matrix_artillery_tevo: ${{ steps.matrix-artillery-tevo.outputs.matrix }}
      matrix_others: ${{ steps.matrix-others.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Read current version
        id: current
        run: |
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Get latest Marlin release
        id: check
        run: |
          FORCE="${{ github.event.inputs.force_version }}"
          if [ -n "$FORCE" ]; then
            echo "version=$FORCE" >> $GITHUB_OUTPUT
            echo "version_dir=$(echo $FORCE | tr '.' '_')" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            LATEST=$(curl -s -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/MarlinFirmware/Marlin/releases/latest" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))")
            CURRENT="${{ steps.current.outputs.version }}"
            echo "current=$CURRENT"
            echo "latest=$LATEST"
            if [ -z "$LATEST" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            elif [ "$LATEST" = "$CURRENT" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "version=$CURRENT" >> $GITHUB_OUTPUT
              echo "version_dir=$(echo $CURRENT | tr '.' '_')" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "version=$LATEST" >> $GITHUB_OUTPUT
              echo "version_dir=$(echo $LATEST | tr '.' '_')" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Sync boards from upstream Configurations
        run: |
          python3 scripts/sync-boards.py --board-matrix board-matrix.json

      - name: Generate Creality matrix
        id: matrix-creality
        run: |
          MATRIX=$(python3 scripts/generate-matrix.py "${{ steps.check.outputs.version_dir }}" --group Creality)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Generate delta+Geeetech matrix
        id: matrix-delta-geetech
        run: |
          MATRIX=$(python3 scripts/generate-matrix.py "${{ steps.check.outputs.version_dir }}" --group delta_Geeetech)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Generate Wanhao+Anet+Tronxy matrix
        id: matrix-wanhao-anet-tronxy
        run: |
          MATRIX=$(python3 scripts/generate-matrix.py "${{ steps.check.outputs.version_dir }}" --group Wanhao_Anet_Tronxy)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Generate BIQU+Sovol+AnyCubic+TwoTrees matrix
        id: matrix-biqu-sovol-anycubic
        run: |
          MATRIX=$(python3 scripts/generate-matrix.py "${{ steps.check.outputs.version_dir }}" --group BIQU_Sovol_AnyCubic_TwoTrees)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Generate Artillery+Tevo+Kingroon+JGAurora+Ultimaker matrix
        id: matrix-artillery-tevo
        run: |
          MATRIX=$(python3 scripts/generate-matrix.py "${{ steps.check.outputs.version_dir }}" --group Artillery_Tevo_Kingroon_JGAurora_Ultimaker)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Generate others matrix
        id: matrix-others
        run: |
          MATRIX=$(python3 scripts/generate-matrix.py "${{ steps.check.outputs.version_dir }}" --group others)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-creality:
    name: "Creality ${{ matrix.label }}"
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.detect.outputs.matrix_creality) }}
      max-parallel: 4
      fail-fast: false
    env:
      BOARD: ${{ matrix.board }}
      VER: ${{ needs.detect.outputs.version }}
      VER_DIR: ${{ needs.detect.outputs.version_dir }}
      BUILD_DIR: ${{ matrix.build_path }}
      CONFIG_DIR: ${{ matrix.config_path }}
      BOARD_PATH: ${{ matrix.board_path }}
      OFFICIAL_PATH: ${{ matrix.official_path }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare build directories
        run: mkdir -p "$BUILD_DIR"
      - name: Prepare configs
        run: |
          OFFICIAL_ARGS="--board \"$BOARD_PATH\" --version \"$VER\" --output-dir \"$CONFIG_DIR\""
          if [ -n "$OFFICIAL_PATH" ] && [ "$OFFICIAL_PATH" != "$BOARD_PATH" ]; then
            OFFICIAL_ARGS="$OFFICIAL_ARGS --official-path \"$OFFICIAL_PATH\""
          fi
          eval "python3 scripts/prepare-configs.py $OFFICIAL_ARGS"
      - name: Compile firmware (EN)
        run: |
          mkdir -p "$BUILD_DIR"
          docker run -u root:root -e BOARD -e USE_TAG="$VER" \
            -v "$(pwd)/$BUILD_DIR:/build_output" -v "$(pwd)/$CONFIG_DIR:/config" \
            --name marlin-build --entrypoint /bin/bash frealmyr/marlin-build:latest -c "
            set -e
            git clone --depth 1 --branch \$USE_TAG https://github.com/MarlinFirmware/Marlin.git /Marlin/
            test -d /Marlin/Marlin || { echo 'CLONE FAILED'; exit 1; }
            cp -r /config/* /Marlin/Marlin/ 2>/dev/null || true
            sed -i \"s/default_envs.*/default_envs = \${BOARD}/\" /Marlin/platformio.ini
            cd /Marlin
            echo '=== Building EN ==='
            platformio run
            mkdir -p /build_output/en
            find .pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\$f\" /build_output/en/
              md5sum \"/build_output/en/\$(basename \"\$f\")\" > \"/build_output/en/\$(basename \"\$f\").md5\"
            done
            echo '=== Building ES ==='
            rm -rf .pio/build
            sed -i 's/^#define LCD_LANGUAGE[[:space:]]*en/#define LCD_LANGUAGE es/' Marlin/Configuration.h
            platformio run
            mkdir -p /build_output/es
            find .pio \( -name 'firmware.bin' -o -name 'firmware.hex' \) | while read f; do
              cp -v \"\$f\" /build_output/es/
              md5sum \"/build_output/es/\$(basename \"\$f\")\" > \"/build_output/es/\$(basename \"\$f\").md5\"
            done
          "; EXIT_CODE=$?
          docker rm marlin-build 2>/dev/null || true
          exit $EXIT_CODE
      - name: Push firmware + configs
        run: |
          sudo chown -R $USER:$USER "$BUILD_DIR" 2>/dev/null || true
          git config --global user.name "JJR Bot"
          git config --global user.email "jrodriguez@qitec.net"
          git add "$CONFIG_DIR/Configuration.h" "$CONFIG_DIR/Configuration_adv.h" "$CONFIG_DIR/config.ini" 2>/dev/null || true
          find "$BUILD_DIR" -type f \( -name 'firmware.bin' -o -name 'firmware.hex' -o -name 'firmware.bin.md5' -o -name 'firmware.hex.md5' \) -exec git add {} \; 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "build: ${{ matrix.label }} @ $VER (EN+ES)"
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push "https://${{ github.actor }}:${{ secrets.COMMIT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master; then break; fi
              sleep 5
            done
          fi

